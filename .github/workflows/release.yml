name: Release

# Publishes a GitHub Release whenever a version tag (vX.Y.Z) is pushed.
# The plugin is built LOCALLY (native Android build, JDK 17) and the resulting
# build/outputs/dice_roll.<version>.snplg is committed before tagging — this
# job just attaches that committed artifact to the Release.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history + tags, so we can diff against the previous tag

      - name: Build release notes from commits since the previous tag
        id: notes
        run: |
          prev="$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || true)"
          if [ -n "$prev" ]; then range="$prev..${GITHUB_REF_NAME}"; else range="${GITHUB_REF_NAME}"; fi
          {
            echo "body<<NOTES_EOF"
            git log --no-merges --pretty=format:'- %s' "$range"
            printf '\n'
            echo "NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Locate the plugin package for this tag
        id: pkg
        run: |
          version="${GITHUB_REF_NAME#v}"
          name="$(node -p "require('./package.json').name")"
          file="build/outputs/${name}.${version}.snplg"
          if [ ! -f "$file" ]; then
            echo "::error::$file not found. Build it locally and commit it before tagging (see README → Releasing)."
            exit 1
          fi
          echo "file=$file" >> "$GITHUB_OUTPUT"

      - name: Create the Release and attach the .snplg
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.body }}
          files: ${{ steps.pkg.outputs.file }}
          fail_on_unmatched_files: true
          generate_release_notes: true # appends GitHub's "Full Changelog" link
